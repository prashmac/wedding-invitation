<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jigar & Rina — Invitations</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0e0e;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Montserrat', sans-serif;
    flex-direction: column;
    gap: 50px;
    padding: 40px 20px;
  }

  .heading {
    text-align: center;
  }
  .heading h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 8vw, 56px);
    font-weight: 300;
    color: #f5f0eb;
    margin-bottom: 8px;
  }
  .heading h1 .amp {
    font-style: italic; color: #c9a96e; font-size: 0.5em;
    display: inline-block; margin: 0 8px;
  }
  .heading p {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px; font-weight: 300;
    letter-spacing: 4px; text-transform: uppercase;
    color: #c9a96e;
  }

  .cards {
    display: flex; gap: 24px;
    flex-wrap: wrap; justify-content: center;
    max-width: 800px; width: 100%;
  }

  .card {
    flex: 1; min-width: 220px; max-width: 260px;
    padding: 40px 28px;
    text-align: center;
    text-decoration: none;
    border: 1px solid rgba(201,169,110,0.15);
    border-radius: 4px;
    background: linear-gradient(160deg, rgba(22,20,18,0.95), rgba(16,14,12,0.98));
    transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    position: relative;
  }
  .card::before {
    content: ''; position: absolute; inset: 6px;
    border: 1px solid rgba(201,169,110,0.06);
    border-radius: 2px; pointer-events: none;
  }
  .card:hover {
    border-color: rgba(201,169,110,0.4);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }

  .card-icon {
    font-size: 28px; margin-bottom: 16px; opacity: 0.8;
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 300;
    color: #f5f0eb; margin-bottom: 8px;
  }
  .card-desc {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px; font-weight: 300;
    color: rgba(245,240,235,0.5);
    letter-spacing: 0.5px; line-height: 1.6;
  }

  .card.wedding {
    background: linear-gradient(160deg, rgba(250,248,245,0.95), rgba(255,255,255,0.98));
    border-color: rgba(107,124,94,0.2);
  }
  .card.wedding::before { border-color: rgba(107,124,94,0.06); }
  .card.wedding:hover { border-color: rgba(107,124,94,0.4); }
  .card.wedding .card-title { color: #3a3632; }
  .card.wedding .card-desc { color: rgba(58,54,50,0.5); }
</style>
</head>
<body>

<div class="heading">
  <h1>Jigar <span class="amp">&</span> Rina</h1>
  <p>4th June 2026</p>
</div>

<div class="cards">
  <a class="card wedding" href="wedding/">
    <div class="card-title">Wedding</div>
    <div class="card-desc">Guest arrival at 11:15am<br>Froyle Park</div>
  </a>
  <a class="card" href="reception/">
    <div class="card-title">Reception</div>
    <div class="card-desc">6:30pm<br>Froyle Park</div>
  </a>
  <a class="card" href="combined/">
    <div class="card-title">Wedding & Reception</div>
    <div class="card-desc">Both events<br>Froyle Park</div>
  </a>
</div>

</body>
</html>
